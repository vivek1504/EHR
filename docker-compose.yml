services:
  db:
    image: postgres:15-alpine
    container_name: ehr-postgres
    environment:
      POSTGRES_USER: ehr_user
      POSTGRES_PASSWORD: ehr_password
      POSTGRES_DB: ehr_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehr_user -d ehr_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
